server:
  port: ${PORT:8080}

spring:
  application:
    name: codeforge-backend
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/codeforge}
      auto-index-creation: true
  # Increase startup connection timeout for slow Atlas connections on free Render tier
  task:
    execution:
      pool:
        core-size: 2

jwt:
  secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-production}
  access-token-expiry-ms: 1800000      # 30 minutes
  refresh-token-expiry-ms: 604800000   # 7 days

llm:
  provider: ${LLM_PROVIDER:GEMINI}     # GEMINI or GROQ
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-1.5-pro
    embedding-model: text-embedding-004
    base-url: https://generativelanguage.googleapis.com/v1beta
  groq:
    api-key: ${GROQ_API_KEY:}
    model: llama-3.1-70b-versatile
    base-url: https://api.groq.com/openai/v1

vector-service:
  base-url: ${CHROMA_SERVICE_URL:http://localhost:8000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.codeforge: DEBUG
    org.mongodb.driver: WARN

